spring.application.name=Crypto_Wallet_ThesisAssignment

spring.datasource.url=jdbc:mysql://localhost:3306/CryptoApplication
spring.datasource.username=REDACTED_DB_USERNAME
spring.datasource.password=REDACTED_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate (JPA) Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# JWT (bearer)token kai to expiration date
app.jwtSecret=REDACTED_JWT_SECRET
app.jwtExpirationInMs=86400000

# Api Url gia to CoinMarketCap
api.url=https://pro-api.coinmarketcap.com/v1/cryptocurrency/listings/latest


# Logging level
#logging.level.org.hibernate.SQL=DEBUG

#logging.level.root=DEBUG

# Display only INFO and higher levels (default)
logging.level.root=INFO

# Enable DEBUG level for specific packages
logging.level.com.unipi.christossiap=DEBUG

#email stuff
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=REDACTED_MAIL_USERNAME
spring.mail.password=REDACTED_MAIL_PASSWORD_OLD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

