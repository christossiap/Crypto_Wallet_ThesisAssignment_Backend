spring.application.name=Crypto_Wallet_ThesisAssignment

spring.datasource.url=jdbc:mysql://localhost:3306/CryptoApplication
spring.datasource.username=${db.username}
spring.datasource.password=${db.password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate (JPA) Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#logging.level.org.hibernate.validator=DEBUG

spring.jpa.properties.javax.persistence.validation.mode=none

#logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#logging.level.org.hibernate.engine.transaction=DEBUG
#logging.level.org.springframework.orm.jpa.JpaTransactionManager=DEBUG

#logging.level.org.hibernate.type.descriptor.sql=TRACE


# JWT (bearer)token kai to expiration date
app.jwtSecret=${jwt.secret}
app.jwtExpirationInMs=${jwt.exp}

# Api Url gia to CoinMarketCap
api.url=${api.url}


#logging.level.root=DEBUG

# Display only INFO and higher levels (default)
#logging.level.root=INFO

# Enable DEBUG level for specific packages
#logging.level.com.unipi.christossiap=DEBUG

#email stuff
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${mail.username}
spring.mail.password=${mail.password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#application allowance
app.cors.allowedOrigins=${api.origins}


